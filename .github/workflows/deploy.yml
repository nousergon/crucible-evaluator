name: Deploy

on:
  push:
    branches: [main]
    paths:
      # Only rebuild + redeploy when code/infra that actually lands in the
      # Docker image changes. Docs, tests, CI, and IAM/example files do not.
      # (Unlike alpha-engine-predictor, the evaluator has no Lambda-SHA drift
      # probe in the weekday pipeline, so path-filtering is safe — a non-image
      # PR won't reform deploy-drift.)
      - 'grading/**'
      - 'director/**'
      - 'requirements*.txt'
      - 'Dockerfile*'
      - 'infrastructure/deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # manual trigger from the Actions UI (e.g. to ship an
                      # already-merged change without a fresh image-affecting push)

# Only one deploy at a time; never cancel an in-progress deploy mid-push.
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC role assumption
  contents: read

jobs:
  deploy:
    name: Build + deploy evaluator + director Lambdas
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout evaluator repo
        uses: actions/checkout@v7

      # The image is built purely from this repo (no proprietary config/prompt
      # is staged from alpha-engine-config — the tuned director/prompt.py is
      # gitignored and the build falls back to director/prompt_example.py, the
      # same behaviour as a local deploy.sh run today). If a tuned Director
      # prompt is ever wanted in production, mirror the predictor/research
      # CONFIG_REPO_DIR staging pattern here.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # deploy.sh's canary steps run `python3 -m krepis.aws invoke-canary`
      # directly on THIS runner (not inside the Lambda's Docker image) —
      # krepis is the shared throttle-aware invoke CLI (config#1494). The
      # runner's stock Python has no project packages, so without this step
      # every canary invoke dies with `ModuleNotFoundError: No module named
      # 'krepis'` (surfaced 2026-07-01, config#1494 follow-up: the CLI
      # conversion wired the call but never installed it on the caller).
      # Pin matches requirements.txt's `krepis[flow_doctor]>=0.7.0` floor;
      # setup-python pins the interpreter so the pip install target doesn't
      # drift with GH's ubuntu-latest image updates.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install krepis (runner-side canary CLI)
        run: pip install "krepis[flow_doctor]>=0.7.0"

      # deploy.sh builds the single ECR image and deploys BOTH the grading
      # Lambda (alpha-engine-evaluator) and the Director Lambda
      # (alpha-engine-evaluator-director — same image, CMD override). It
      # canaries each (grading expects status:ok; director expects
      # status:disabled while DIRECTOR_ENABLED is off) and repoints the :live
      # alias. It PRESERVES any operator-set DIRECTOR_ENABLED — the auto-deploy
      # never resets the flag.
      - name: Build image + deploy both Lambdas
        run: bash infrastructure/deploy.sh

      - name: Report deployed versions
        run: |
          echo "Deployed commit: ${{ github.sha }}"
          for fn in alpha-engine-evaluator alpha-engine-evaluator-director; do
            echo "== $fn =="
            aws lambda get-function \
              --function-name "$fn" \
              --query "Configuration.[LastModified,CodeSha256]" \
              --output text
          done

      - name: Append to system-wide deploy changelog
        if: always()
        uses: nousergon/nousergon-docs/.github/actions/append-changelog@main
        with:
          deploy_status: ${{ job.status == 'success' && 'success' || 'failure' }}
          deploy_workflow: deploy.yml
          subsystem: evaluator

  # Alert (Telegram) on genuine post-merge failure of this workflow on the
  # default branch. Reusable workflow + transport in nousergon-lib. config#1128.
  notify-main-failure:
    needs: [deploy]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
