flow_name: evaluator-lambda
repo: nousergon/crucible-evaluator
owner: "@brianmcmahon"
notify:
  - type: email
    sender: ${EMAIL_SENDER}
    recipients: ${EMAIL_RECIPIENTS}
    smtp_host: smtp.gmail.com
    smtp_port: 587
    smtp_password: ${GMAIL_APP_PASSWORD}
  - type: s3
    bucket: alpha-engine-research
    subsystem: evaluator
# DynamoDB, not ephemeral /tmp SQLite: this Lambda's /tmp is wiped between
# separate invocations (and never shared across concurrent ones), so a
# sqlite file here can't durably track state -- dedup_cooldown_minutes below
# would silently never suppress a repeat alert (alpha-engine-config#2418;
# already bit nousergon-data once). DynamoDB persists across invocations so
# the cooldown actually works.
store:
  type: dynamodb
  table_name: flow-doctor-store
  region: us-east-1
dedup_cooldown_minutes: 60
dependencies: []
rate_limits:
  max_alerts_per_day: 10
